<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlovakGO — немає мережі</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7fb;
        color: #211946;
      }
      main {
        width: 100%;
        max-width: 400px;
        border-radius: 20px;
        background: #fff;
        padding: 32px 24px;
        box-shadow: 0 14px 40px rgba(41, 34, 80, 0.10);
        text-align: center;
      }
      .icon { font-size: 3rem; margin-bottom: 12px; }
      h1 { margin: 0 0 8px; font-size: 1.35rem; }
      p  { margin: 0 0 24px; color: #706a8c; line-height: 1.55; font-size: 0.95rem; }
      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: #211946;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button:hover { opacity: 0.87; }
      .status {
        margin-top: 16px;
        font-size: 0.8rem;
        color: #706a8c;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">📡</div>
      <h1>Немає інтернету</h1>
      <p>SlovakGO збереже ваш прогрес і синхронізує зміни одразу після відновлення мережі.</p>
      <button onclick="location.reload()">Спробувати знову</button>
      <p class="status" id="status">Очікування мережі…</p>
    </main>
    <script>
      window.addEventListener('online', () => {
        document.getElementById('status').textContent = 'Мережа відновлена — перезавантаження…';
        setTimeout(() => location.reload(), 800);
      });
    </script>
  </body>
</html>
